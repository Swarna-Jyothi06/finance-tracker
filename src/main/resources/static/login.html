<!DOCTYPE html>
<html>
<head>
<title>Finance Tracker - Login</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#36d1dc,#5b86e5,#6dd5ed);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.container{
background:white;
padding:35px;
border-radius:12px;
box-shadow:0 8px 25px rgba(0,0,0,0.2);
width:320px;
text-align:center;
}

h2{
margin-bottom:20px;
}

input{
width:90%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#36d1dc;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

#result{
margin-top:10px;
color:green;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>Login</h2>

<form id="loginForm">

<input type="email" id="email" placeholder="Email" required>

<input type="password" id="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<p id="result"></p>

<p>Don't have an account? <a href="signup.html">Sign Up</a></p>

</div>

<script>

document.getElementById("loginForm").addEventListener("submit", function(e){

e.preventDefault();

fetch("/users/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

email:document.getElementById("email").value,
password:document.getElementById("password").value

})

})

.then(response=>response.text())
.then(data=>{
document.getElementById("result").innerText=data;
});

});

</script>

</body>
</html>
