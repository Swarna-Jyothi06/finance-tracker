<!DOCTYPE html>
<html>
<head>
<title>Finance Tracker Dashboard</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.phone{
width:300px;
background:white;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
padding:20px;
}

h3{
text-align:center;
margin-bottom:20px;
}

input,select{
width:100%;
padding:8px;
margin:6px 0;
border-radius:8px;
border:1px solid #ddd;
background:#f3efe7;
}

button{
width:100%;
padding:10px;
background:#e8b84c;
border:none;
border-radius:20px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#d9a73a;
}

.nav{
display:flex;
justify-content:space-around;
margin-top:20px;
padding-top:10px;
border-top:1px solid #eee;
font-size:12px;
color:#777;
}

</style>

</head>

<body>

<div class="phone">

<h3>Add Transaction</h3>

<form id="transactionForm">

<input type="number" id="amount" placeholder="Amount" required>

<input type="text" id="description" placeholder="Description">

<select id="category">
<option>Food</option>
<option>Transport</option>
<option>Shopping</option>
<option>Entertainment</option>
</select>

<select id="account">
<option>Cash</option>
<option>Bank</option>
</select>

<input type="date" id="date">

<button type="submit">Save</button>

</form>

<p id="result"></p>

<div class="nav">

<div>🏠 Dashboard</div>
<div><b>📋 Transactions</b></div>
<div>📊 Budget</div>
<div>👤 Profile</div>

</div>

</div>

<script>

document.getElementById("transactionForm").addEventListener("submit",function(e){

e.preventDefault();

fetch("/transactions/add",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

amount:document.getElementById("amount").value,
description:document.getElementById("description").value,
category:document.getElementById("category").value,
account:document.getElementById("account").value,
date:document.getElementById("date").value

})

})

.then(response=>response.json())
.then(data=>{

document.getElementById("result").innerText="Transaction Added";

});

});

</script>

</body>
</html>
