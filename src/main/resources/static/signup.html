<!DOCTYPE html>
<html>
<head>
<title>Finance Tracker - Sign Up</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb,#a6c1ee);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.container{
background:white;
padding:35px;
border-radius:12px;
box-shadow:0 8px 25px rgba(0,0,0,0.2);
width:320px;
text-align:center;
}

h2{
margin-bottom:20px;
}

input{
width:90%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#ff758c;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

#result{
margin-top:10px;
color:green;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>Sign Up</h2>

<form id="signupForm">

<input type="text" id="name" placeholder="Full Name" required>

<input type="email" id="email" placeholder="Email" required>

<input type="password" id="password" placeholder="Password" required>

<input type="password" id="confirmPassword" placeholder="Confirm Password" required>

<input type="number" id="income" placeholder="Income">

<input type="number" id="savings" placeholder="Savings Target">

<button type="submit">Sign Up</button>

</form>

<p id="result"></p>

<p>Already have an account? <a href="login.html">Login</a></p>

</div>

<script>

document.getElementById("signupForm").addEventListener("submit", function(e){

e.preventDefault();

let password=document.getElementById("password").value;
let confirmPassword=document.getElementById("confirmPassword").value;

if(password!==confirmPassword){
document.getElementById("result").innerText="Passwords do not match!";
return;
}

fetch("/users/register",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

name:document.getElementById("name").value,
email:document.getElementById("email").value,
password:password,
income:document.getElementById("income").value,
savingsTarget:document.getElementById("savings").value

})

})

.then(response=>response.json())
.then(data=>{
document.getElementById("result").innerText="User Registered Successfully";
});

});

</script>

</body>
</html>
